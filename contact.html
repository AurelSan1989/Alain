<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Alain Girodet</title>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <script src="contact.js" defer></script>
</head>
<body>
    <header>
        <nav>
        <a href="index.html" class="nav-logo">Alain Girodet</a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="textes.html">Textes</a></li>
            <li><a href="photos.html">Photos</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        </nav>
        <!-- Ici on placera un bouton pour le menu mobile -->
     </header>
     <main class="contact-main">
        <form action="#" class="contact-form" method="#">
            <div class="form-header">
                <div class="form-field">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" placeholder="Votre nom" required>
                </div>
                <div class="form-field">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" placeholder="email@exemple.com" required>
                </div>
            </div>
            <div class="form-body">
                <div class="form-field">
                    <label for="subject">Objet</label>
                    <input type="text" id="subject" name="subject" placeholder="Sujet de votre message" required>
                </div>
                <div class="form-field">
                    <label for="message">Votre message</label>
                    <textarea name="message" id="message" rows="6" placeholder="Écrivez ici..." required></textarea>
                </div>
            </div>
            <div class="form-footer">
                <div class="form-privacy">
                    <span class="material-symbols-outlined" style="font-size:16px;">lock</span>
                    <span class="privacy-text">Vos données sont traitées avec respect et confidentialité.</span>
                </div>
                <button class="btn-contact" type="submit">Envoyer le message</button>
            </div>            
            <div id="feedback">
                <p class="success">Votre message a été envoyé avec succès.</p>
                <p class="error">Une erreur est survenue, veuillez réessayer.</p>
            </div>
        </form>
     </main>
     <footer>
        <section class="footer-container">
            <div class="footer-brand">
                <span class="footer-name">Alain Girodet</span>
                <p class="footer-copy">@2026 Alain Girodet. Tous droits réservés</p>
            </div>
            <ul class="footer-links">
                <li><a href="https://www.facebook.com/alain.girodet" target="_blank">Facebook</a></li>
                <li><a href="https://www.instagram.com/alaingirodet/" target="_blank">Instagram</a></li>
            </ul>
        </section>
     </footer>
</body>
</html>
